<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buzzer — Jeopardy</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0c14;
      --surface: #131829;
      --blue:    #1a4fa0;
      --blue-lt: #2563c9;
      --gold:    #f5c518;
      --orange:  #e67e22;
      --text:    #e8eaf0;
      --muted:   #9aa3be;   /* lifted from #7a8099 for better contrast */
      --danger:  #e67e22;   /* orange — avoids red/green confusion */
      --radius:  10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100dvh;         /* dvh handles mobile browser chrome */
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 32px;
      gap: 20px;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .game-title {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--gold);
      letter-spacing: 1px;
      text-align: center;
      line-height: 1.2;
    }
    .header-sub {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .room-code {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .room-code span {
      color: var(--text);
      font-weight: 600;
    }
    .player-badge {
      font-size: 0.85rem;
      background: var(--blue);
      padding: 4px 12px;
      border-radius: 20px;
    }

    /* ── Scoreboard ─────────────────────────────────────────────── */
    .scoreboard {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 2px solid #3a4060;
      border-radius: var(--radius);
      overflow: hidden;
    }
    .scoreboard-title {
      background: var(--blue);
      padding: 8px 16px;
      font-size: 0.8rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #cce;
    }
    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      border-bottom: 1px solid #1a1e30;
      font-size: 0.95rem;
      transition: background 0.3s;
    }
    .score-row:last-child { border-bottom: none; }
    /* Left border + tint — two signals (shape + color) not just color alone */
    .score-row.me {
      background: rgba(37, 99, 201, 0.2);
      border-left: 3px solid var(--blue-lt);
    }
    .score-row.answering {
      background: rgba(245, 197, 24, 0.12);
      border-left: 3px solid var(--gold);
    }
    .score-name { font-weight: 600; }
    .score-pts  { color: var(--gold); font-weight: 700; }
    .empty-msg  { padding: 16px; color: var(--muted); font-size: 0.9rem; text-align: center; }

    /* ── Buzz button ────────────────────────────────────────────── */
    .buzz-section {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #buzzBtn {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #f5d860, var(--gold) 60%, var(--gold) 100%);
      color: #0a0c14;
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 3px;
      border: none;
      cursor: pointer;
      box-shadow: 0 0 40px rgba(245,197,24,0.35), 0 8px 30px rgba(0,0,0,0.5);
      transition: transform 0.12s, box-shadow 0.12s, filter 0.12s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    #buzzBtn:active:not(:disabled) {
      transform: scale(0.93);
      box-shadow: 0 0 20px rgba(245,197,24,0.2), 0 4px 15px rgba(0,0,0,0.4);
    }
    #buzzBtn:disabled {
      background: radial-gradient(circle at 35% 35%, #555, #333);
      color: #888;
      box-shadow: none;
      cursor: not-allowed;
    }
    /* Orange when first — distinguishable by all color-blind types vs blue/gold */
    #buzzBtn.first-buzz {
      background: radial-gradient(circle at 35% 35%, #f0a060, var(--orange) 60%);
      color: #fff;
      animation: pulseOrange 1s ease-in-out infinite;
    }
    @keyframes pulseOrange {
      0%, 100% { box-shadow: 0 0 30px rgba(230,126,34,0.5); }
      50%       { box-shadow: 0 0 70px rgba(230,126,34,0.9); }
    }

    /* Dimmed orange when buzzed but not first */
    #buzzBtn.buzzed {
      background: radial-gradient(circle at 35% 35%, #888, #555);
      color: #ccc;
      font-size: 1.1rem;
      opacity: 0.75;
      cursor: not-allowed;
      box-shadow: none;
    }

    .buzz-hint {
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* ── Buzz order list ────────────────────────────────────────── */
    .buzz-order {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 2px solid #3a4060;
      border-radius: var(--radius);
    }
    .buzz-order-title {
      background: var(--blue);
      padding: 8px 16px;
      font-size: 0.8rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #e0e8ff;
    }
    .buzz-list {
      list-style: none;
      padding: 8px 0;
    }
    .buzz-list li {
      padding: 7px 16px;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    /* Gold left border on first place — shape signal, not just badge color */
    .buzz-list li.buzz-first {
      border-left: 3px solid var(--gold);
      background: rgba(245,197,24,0.06);
    }
    .buzz-rank {
      background: var(--blue-lt);
      color: #fff;
      font-size: 0.8rem;
      font-weight: 700;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .buzz-rank.first { background: var(--gold); color: #0a0c14; font-size: 0.9rem; }
    .buzz-empty { padding: 12px 16px; color: var(--muted); font-size: 0.9rem; }

    /* ── Answering highlight (this player is selected) ──────────── */
    #answerBanner {
      display: none;
      width: 100%;
      max-width: 480px;
      border: 2px solid var(--gold);
      border-radius: var(--radius);
      background: rgba(245,197,24,0.08);
      padding: 20px;
      text-align: center;
      animation: pulseBorder 1.2s ease-in-out infinite;
    }
    #answerBanner.visible { display: block; }
    @keyframes pulseBorder {
      0%, 100% { border-color: var(--gold); box-shadow: 0 0 10px rgba(245,197,24,0.3); }
      50%       { border-color: #fff8c0;    box-shadow: 0 0 30px rgba(245,197,24,0.6); }
    }
    /* Timer bar — shrinks from both sides via scaleX on a centered element */
    .timer-bar-track {
      width: 100%;
      height: 10px;
      background: rgba(255,255,255,0.08);
      border-radius: 5px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .timer-bar-fill {
      height: 100%;
      width: 100%;
      border-radius: 5px;
      transform-origin: center;
      transform: scaleX(1);
      transition: transform 0.25s linear, background-color 0.6s ease;
      background: var(--blue-lt);
    }

    .answer-label {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--gold);
      margin-bottom: 8px;
    }
    #countdown {
      font-size: 3.5rem;
      font-weight: 900;
      color: var(--text);
      line-height: 1;
    }
    #countdown.urgent { color: var(--danger); animation: shake 0.3s ease-in-out infinite; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25%       { transform: translateX(-3px); }
      75%       { transform: translateX(3px); }
    }
    .timesup { font-size: 1.4rem; font-weight: 700; color: var(--danger); }

    /* ── Wordle mode ────────────────────────────────────────────── */
    .wordle-card {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 2px solid #3a4060;
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
    }
    .wordle-row { display: flex; gap: 5px; justify-content: center; margin-bottom: 5px; }
    .wordle-tile {
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.2rem;
      color: #fff;
      border: 2px solid #2a3050;
      border-radius: 4px;
      background: transparent;
      flex-shrink: 0;
    }
    .wordle-tile.correct { background: var(--gold); color: #0a0c14; border-color: var(--gold); }
    .wordle-tile.present { background: var(--blue-lt); color: #fff; border-color: var(--blue-lt); }
    .wordle-tile.absent  { background: #2a3050; color: var(--muted); border-color: #2a3050; }

    .wordle-keyboard { width: 100%; max-width: 480px; }
    .kb-row { display: flex; gap: 6px; justify-content: center; margin-bottom: 6px; }
    .kb-key {
      min-width: 30px;
      height: 46px;
      padding: 0 8px;
      background: #2a3050;
      color: var(--text);
      border-radius: 6px;
      font-weight: 700;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      flex: 1;
    }
    .kb-key.wide { flex: 1.6; font-size: 0.7rem; }
    .kb-key.correct { background: var(--gold); color: #0a0c14; }
    .kb-key.present { background: var(--blue-lt); color: #fff; }
    .kb-key.absent  { background: #14172a; color: var(--muted); }

    .wordle-player-card {
      background: var(--surface);
      border: 2px solid #3a4060;
      border-radius: var(--radius);
      padding: 14px;
      width: 100%;
      max-width: 480px;
    }
    .wordle-player-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 8px; }
  </style>
</head>
<body>

  <header>
    <div class="game-title" id="gameTitle">Loading…</div>
    <div class="header-sub">
      <div class="room-code">Room&nbsp;<span id="headerCode"></span></div>
      <div class="player-badge" id="playerBadge"></div>
    </div>
  </header>

  <!-- Buzzer panel -->
  <div id="buzzerPanel">
    <!-- Answering banner (shown only when this player is selected) -->
    <div id="answerBanner">
      <div class="timer-bar-track">
        <div class="timer-bar-fill" id="timerBar"></div>
      </div>
      <div class="answer-label">Your turn to answer!</div>
      <div id="countdown">60</div>
    </div>

    <!-- Scoreboard -->
    <div class="scoreboard">
      <div class="scoreboard-title">Scoreboard</div>
      <div id="scoreList"><div class="empty-msg">Waiting for players…</div></div>
    </div>

    <!-- Buzz button -->
    <div class="buzz-section">
      <button id="buzzBtn" onclick="buzz()">BUZZ</button>
      <div class="buzz-hint">or press <strong>Space</strong></div>
    </div>

    <!-- Buzz order -->
    <div class="buzz-order">
      <div class="buzz-order-title">Buzz Order</div>
      <div id="buzzOrderList"><div class="buzz-empty">No buzzes yet</div></div>
    </div>
  </div>

  <!-- Wordle panel -->
  <div id="wordlePanel" style="display:none">
    <div class="wordle-card" id="wordleWaiting">Waiting for the host to push a word…</div>

    <div id="wordleActive" style="display:none">
      <div class="wordle-card">
        <div id="myWordleGrid"></div>
      </div>
      <div class="wordle-keyboard" id="wordleKeyboard"></div>
    </div>

    <div id="solvedSection" style="display:none">
      <div class="buzz-order-title" style="border-radius:10px 10px 0 0;">Solved</div>
      <div id="solvedList"></div>
    </div>
  </div>

  <!-- Socket.io client (served automatically by socket.io) -->
  <script src="/socket.io/socket.io.js"></script>
  <script>
    // ── Read credentials stored by index.html ─────────────────────────────
    const roomCode   = location.pathname.split('/').pop().toUpperCase();
    const password   = sessionStorage.getItem('roomPass')   || '';
    const playerName = sessionStorage.getItem('playerName') || '';
    const nameColor  = sessionStorage.getItem('nameColor')  || '#E8EAF0';

    document.getElementById('headerCode').textContent  = roomCode;
    document.getElementById('playerBadge').textContent = playerName || 'Player';

    // ── Connect to socket server ──────────────────────────────────────────
    const socket = io();

    socket.on('connect', () => {
      // Introduce ourselves to the server — name color was chosen once, in the join form
      socket.emit('join_room', { roomCode, playerName, password, color: nameColor });
    });

    socket.on('error', ({ message }) => {
      // Redirect home with the message — simplest UX for a wrong password / gone room
      alert('Could not join: ' + message);
      window.location.href = '/?error=room_not_found';
    });

    // ── Countdown timer ───────────────────────────────────────────────────
    let timerInterval = null;

    function startCountdown(endsAt) {
      clearInterval(timerInterval);
      const banner = document.getElementById('answerBanner');
      const display = document.getElementById('countdown');

      banner.classList.add('visible');
      display.classList.remove('urgent');
      display.className = ''; // clear timesup class

      const bar = document.getElementById('timerBar');
      let timesUpPlayed = false;
      timerInterval = setInterval(() => {
        const remaining = Math.ceil((endsAt - Date.now()) / 1000);

        // Update bar — scaleX(1) = full, scaleX(0) = closed from both sides
        const ratio = Math.max(0, remaining / 60);
        bar.style.transform = `scaleX(${ratio})`;
        bar.style.backgroundColor = remaining <= 10 ? '#e67e22'   /* orange  */
                                   : remaining <= 30 ? '#f5c518'   /* gold    */
                                   :                   '#2563c9';  /* blue    */

        if (remaining <= 0) {
          clearInterval(timerInterval);
          display.innerHTML = '<span class="timesup">Time\'s up!</span>';
          if (!timesUpPlayed) { timesUpPlayed = true; playTimesUpSound(); }
          return;
        }
        display.textContent = remaining;
        if (remaining <= 10) display.classList.add('urgent');
      }, 250);
    }

    function stopCountdown() {
      clearInterval(timerInterval);
      document.getElementById('answerBanner').classList.remove('visible');
    }

    // ── Audio — preload both sounds via Web Audio API ────────────────────────
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let buzzBuffer   = null;
    let timesUpBuffer = null;

    function loadSound(url) {
      return fetch(url).then(r => r.arrayBuffer()).then(buf => audioCtx.decodeAudioData(buf)).catch(() => null);
    }
    loadSound('/rightanswer.mp3').then(b => { buzzBuffer    = b; });
    loadSound('/times-up.mp3').then(b =>   { timesUpBuffer = b; });

    function playSound(buffer, volume = 1.5) {
      if (!buffer) return;
      audioCtx.resume().then(() => {
        const src  = audioCtx.createBufferSource();
        const gain = audioCtx.createGain();
        src.buffer      = buffer;
        gain.gain.value = volume;
        src.connect(gain);
        gain.connect(audioCtx.destination);
        src.start(0);
      });
    }

    function playBuzzSound()   { playSound(buzzBuffer); }
    function playTimesUpSound() { playSound(timesUpBuffer); }

    // ── Buzz button ───────────────────────────────────────────────────────
    let hasBuzzed = false;

    function buzz() {
      if (hasBuzzed) return;
      hasBuzzed = true;
      playBuzzSound();
      socket.emit('buzz', { roomCode });
    }

    // Also trigger buzz on spacebar
    document.addEventListener('keydown', e => {
      if (e.code === 'Space' && e.target === document.body) {
        e.preventDefault();
        buzz();
      }
    });

    // ── Room state update ─────────────────────────────────────────────────
    socket.on('room_state', ({ players, buzzOrder, answeringPlayer, timerEndsAt, hostName, mode }) => {
      // Show host name as "X's Jeopardy" or "X's Hoodlumzle" depending on mode
      // — apostrophe handling for names ending in s
      if (hostName) {
        const brand  = mode === 'wordle' ? 'Hoodlumzle' : 'Jeopardy';
        const suffix = hostName.endsWith('s') ? `’ ${brand}` : `’s ${brand}`;
        document.getElementById('gameTitle').textContent = hostName + suffix;
      }

      // Toggle which panel is visible based on the room's game mode (fixed at creation)
      document.getElementById('buzzerPanel').style.display = mode === 'wordle' ? 'none' : '';
      document.getElementById('wordlePanel').style.display = mode === 'wordle' ? '' : 'none';

      renderScoreboard(players, answeringPlayer);
      renderBuzzOrder(buzzOrder, players);

      const btn = document.getElementById('buzzBtn');

      // Show/hide the answering banner
      if (answeringPlayer === socket.id && timerEndsAt) {
        startCountdown(timerEndsAt);
      } else {
        stopCountdown();
      }

      const iInBuzzOrder = buzzOrder.includes(socket.id);
      const iFirst       = buzzOrder[0] === socket.id;

      if (iFirst) {
        btn.classList.add('first-buzz');
        btn.classList.remove('buzzed');
        btn.textContent = 'BUZZED!!';
        btn.disabled    = false;
        btn.onclick     = null;
      } else if (iInBuzzOrder || answeringPlayer) {
        btn.classList.remove('first-buzz');
        btn.classList.add('buzzed');
        btn.textContent = 'BUZZED';
        btn.disabled    = true;
        btn.onclick     = null;
      } else {
        // Host reset — back to ready state
        btn.classList.remove('first-buzz', 'buzzed');
        btn.textContent = 'BUZZ';
        btn.disabled    = false;
        btn.onclick     = buzz;
        hasBuzzed       = false;
      }
    });

    // ── Wordle mode ────────────────────────────────────────────────────────
    let lastWordleState = null;
    let currentGuess    = '';
    let myWordLength    = null;

    const KB_ROWS = ['QWERTYUIOP', 'ASDFGHJKL', 'ZXCVBNM'];
    (function buildKeyboard() {
      const el = document.getElementById('wordleKeyboard');
      el.innerHTML = KB_ROWS.map((row, i) => {
        let keys = row.split('').map(ch =>
          `<div class="kb-key" data-key="${ch}" onclick="typeLetter('${ch}')">${ch}</div>`
        ).join('');
        if (i === 2) {
          keys = `<div class="kb-key wide" onclick="submitGuess()">ENTER</div>` + keys +
                 `<div class="kb-key wide" onclick="backspace()">&#9003;</div>`;
        }
        return `<div class="kb-row">${keys}</div>`;
      }).join('');
    })();

    socket.on('wordle_state', (state) => {
      lastWordleState = state;
      myWordLength     = state.wordLength;

      document.getElementById('wordleWaiting').style.display = state.pushed ? 'none' : '';
      document.getElementById('wordleActive').style.display  = state.pushed ? '' : 'none';
      if (!state.pushed) currentGuess = '';

      renderMyGrid();
      renderKeyboard(state.myGuesses);
      renderSolvedSection(state.solvedBoards);
    });

    function renderMyGrid() {
      if (!lastWordleState) return;
      const { myGuesses, mySolved } = lastWordleState;
      const el = document.getElementById('myWordleGrid');

      const rows = myGuesses.map(g =>
        `<div class="wordle-row">` + g.guess.split('').map((ch, i) =>
          `<div class="wordle-tile ${g.result[i]}">${esc(ch)}</div>`
        ).join('') + `</div>`
      );

      if (!mySolved) {
        const padded = currentGuess.padEnd(myWordLength || 0, ' ').split('');
        rows.push(`<div class="wordle-row">` + padded.map(ch =>
          `<div class="wordle-tile">${ch.trim() ? esc(ch) : ''}</div>`
        ).join('') + `</div>`);
      }

      el.innerHTML = rows.join('');
    }

    function renderKeyboard(guesses) {
      const rank = { absent: 0, present: 1, correct: 2 };
      const best = {};
      guesses.forEach(g => g.guess.split('').forEach((ch, i) => {
        const st = g.result[i];
        if (!best[ch] || rank[st] > rank[best[ch]]) best[ch] = st;
      }));
      document.querySelectorAll('.kb-key[data-key]').forEach(keyEl => {
        const k = keyEl.dataset.key;
        keyEl.className = 'kb-key' + (best[k] ? ' ' + best[k] : '');
      });
    }

    function renderSolvedSection(solvedBoards) {
      const entries = Object.entries(solvedBoards || {});
      document.getElementById('solvedSection').style.display = entries.length ? '' : 'none';
      document.getElementById('solvedList').innerHTML = entries.map(([id, board]) => `
        <div class="wordle-player-card">
          <div class="wordle-player-name"><span style="color:${safeColor(board.color)}">${esc(board.name)}</span>${id === socket.id ? ' <em style="color:var(--muted);font-size:0.8rem">(you)</em>' : ''}</div>
          ${board.guesses.map(g => `<div class="wordle-row">` +
            g.guess.split('').map((ch, i) => `<div class="wordle-tile ${g.result[i]}">${esc(ch)}</div>`).join('') +
          `</div>`).join('')}
        </div>`).join('');
    }

    function typeLetter(ch) {
      if (lastWordleState?.mySolved) return;
      if (currentGuess.length >= (myWordLength || 0)) return;
      currentGuess += ch;
      renderMyGrid();
    }
    function backspace() {
      if (lastWordleState?.mySolved) return;
      currentGuess = currentGuess.slice(0, -1);
      renderMyGrid();
    }
    function submitGuess() {
      if (lastWordleState?.mySolved) return;
      if (currentGuess.length !== myWordLength) return;
      socket.emit('wordle_guess', { roomCode, guess: currentGuess });
      currentGuess = '';
    }

    // Physical keyboard support (mirrors the spacebar-buzz pattern above).
    // preventDefault matters here: an unhandled Backspace with no input focused
    // can trigger the browser's "navigate back" action in some browsers, which
    // would yank the player off the page entirely.
    document.addEventListener('keydown', e => {
      if (document.getElementById('wordlePanel').style.display === 'none') return;
      if (/^[a-zA-Z]$/.test(e.key)) {
        e.preventDefault();
        typeLetter(e.key.toUpperCase());
      } else if (e.key === 'Backspace') {
        e.preventDefault();
        backspace();
      } else if (e.key === 'Enter') {
        e.preventDefault();
        submitGuess();
      }
    });

    // ── Render helpers ────────────────────────────────────────────────────

    function renderScoreboard(players, answeringPlayer) {
      const el = document.getElementById('scoreList');
      const entries = Object.entries(players);
      if (entries.length === 0) {
        el.innerHTML = '<div class="empty-msg">No players yet</div>';
        return;
      }

      // Sort by score descending
      entries.sort((a, b) => b[1].score - a[1].score);

      el.innerHTML = entries.map(([id, p]) => {
        const isMe        = id === socket.id;
        const isAnswering = id === answeringPlayer;
        let cls = 'score-row';
        if (isMe)        cls += ' me';
        if (isAnswering) cls += ' answering';
        const tag = isMe ? ' <em style="font-size:0.75rem;color:var(--muted)">(you)</em>' : '';
        return `<div class="${cls}">
          <span class="score-name"><span style="color:${safeColor(p.color)}">${esc(p.name)}</span>${tag}</span>
          <span class="score-pts">${p.score} pts</span>
        </div>`;
      }).join('');
    }

    function renderBuzzOrder(buzzOrder, players) {
      const el = document.getElementById('buzzOrderList');
      if (buzzOrder.length === 0) {
        el.innerHTML = '<div class="buzz-empty">No buzzes yet</div>';
        return;
      }
      const ordinals = ['1st', '2nd', '3rd', '4th', '5th', '6th', '7th', '8th'];
      el.innerHTML = '<ul class="buzz-list">' +
        buzzOrder.map((id, i) => {
          const name    = players[id]?.name || 'Unknown';
          const color   = players[id]?.color;
          const liCls   = i === 0 ? 'buzz-first' : '';
          const rankCls = i === 0 ? 'buzz-rank first' : 'buzz-rank';
          const youTag  = id === socket.id ? ' <em style="color:var(--muted);font-size:0.8rem">(you)</em>' : '';
          return `<li class="${liCls}">
            <span class="${rankCls}">${i + 1}</span>
            <strong>${ordinals[i] || (i + 1) + 'th'}:</strong> <span style="color:${safeColor(color)}">${esc(name)}</span>${youTag}
          </li>`;
        }).join('') + '</ul>';
    }

    // Simple HTML-escape to avoid XSS from player-supplied names
    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // Defense in depth: only ever interpolate a verified hex code into a style attribute
    function safeColor(c) {
      return /^#[0-9A-Fa-f]{6}$/.test(c || '') ? c : 'inherit';
    }
  </script>
</body>
</html>
