<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buzzer — Jeopardy</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0c14;
      --surface: #131829;
      --blue:    #1a4fa0;
      --blue-lt: #2563c9;
      --gold:    #f5c518;
      --orange:  #e67e22;
      --text:    #e8eaf0;
      --muted:   #9aa3be;   /* lifted from #7a8099 for better contrast */
      --danger:  #e67e22;   /* orange — avoids red/green confusion */
      --radius:  10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100dvh;         /* dvh handles mobile browser chrome */
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 32px;
      gap: 20px;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .game-title {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--gold);
      letter-spacing: 1px;
      text-align: center;
      line-height: 1.2;
    }
    .header-sub {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .room-code {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .room-code span {
      color: var(--text);
      font-weight: 600;
    }
    .player-badge {
      font-size: 0.85rem;
      background: var(--blue);
      padding: 4px 12px;
      border-radius: 20px;
    }

    /* ── Scoreboard ─────────────────────────────────────────────── */
    .scoreboard {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 2px solid #3a4060;
      border-radius: var(--radius);
      overflow: hidden;
    }
    .scoreboard-title {
      background: var(--blue);
      padding: 8px 16px;
      font-size: 0.8rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #cce;
    }
    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      border-bottom: 1px solid #1a1e30;
      font-size: 0.95rem;
      transition: background 0.3s;
    }
    .score-row:last-child { border-bottom: none; }
    /* Left border + tint — two signals (shape + color) not just color alone */
    .score-row.me {
      background: rgba(37, 99, 201, 0.2);
      border-left: 3px solid var(--blue-lt);
    }
    .score-row.answering {
      background: rgba(245, 197, 24, 0.12);
      border-left: 3px solid var(--gold);
    }
    .score-name { font-weight: 600; font-size: 1.3rem; }
    .score-pts  { color: var(--gold); font-weight: 700; font-size: 1.3rem; }
    .empty-msg  { padding: 16px; color: var(--muted); font-size: 0.9rem; text-align: center; }

    /* ── Buzz button ────────────────────────────────────────────── */
    .buzz-section {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #buzzBtn {
      width: 250px;
      height: 250px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #f5d860, var(--gold) 60%, var(--gold) 100%);
      color: #0a0c14;
      font-size: 2.3rem;
      font-weight: 900;
      letter-spacing: 3px;
      border: none;
      cursor: pointer;
      box-shadow: 0 0 40px rgba(245,197,24,0.35), 0 8px 30px rgba(0,0,0,0.5);
      transition: transform 0.12s, box-shadow 0.12s, filter 0.12s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    #buzzBtn:active:not(:disabled) {
      transform: scale(0.93);
      box-shadow: 0 0 20px rgba(245,197,24,0.2), 0 4px 15px rgba(0,0,0,0.4);
    }
    #buzzBtn:disabled {
      background: radial-gradient(circle at 35% 35%, #555, #333);
      color: #888;
      box-shadow: none;
      cursor: not-allowed;
    }
    /* Orange once buzzed — distinguishable by all color-blind types vs gold */
    #buzzBtn.buzzed {
      background: radial-gradient(circle at 35% 35%, #f0a060, var(--orange) 60%);
      color: #fff;
      font-size: 1.25rem;
      box-shadow: 0 0 30px rgba(230,126,34,0.4);
      cursor: not-allowed;
    }
    /* Extra pulse for whoever got there first — bonus feedback, doesn't change color */
    #buzzBtn.first-buzz {
      animation: pulseOrange 1s ease-in-out infinite;
    }
    @keyframes pulseOrange {
      0%, 100% { box-shadow: 0 0 30px rgba(230,126,34,0.5); }
      50%       { box-shadow: 0 0 70px rgba(230,126,34,0.9); }
    }

    /* Green once the host selects you to answer — overrides buzzed/first-buzz */
    #buzzBtn.selected {
      background: radial-gradient(circle at 35% 35%, #6fdb8f, #27ae60 60%);
      color: #fff;
      font-size: 1.25rem;
      box-shadow: 0 0 40px rgba(39,174,96,0.45);
      cursor: not-allowed;
    }

    .buzz-hint {
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* ── Buzz order list ────────────────────────────────────────── */
    .buzz-order {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 2px solid #3a4060;
      border-radius: var(--radius);
    }
    .buzz-order-title {
      background: var(--blue);
      padding: 8px 16px;
      font-size: 0.8rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #e0e8ff;
    }
    .buzz-list {
      list-style: none;
      padding: 8px 0;
    }
    .buzz-list li {
      padding: 7px 16px;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    /* Gold left border on first place — shape signal, not just badge color */
    .buzz-list li.buzz-first {
      border-left: 3px solid var(--gold);
      background: rgba(245,197,24,0.06);
    }
    .buzz-rank {
      background: var(--blue-lt);
      color: #fff;
      font-size: 0.8rem;
      font-weight: 700;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .buzz-rank.first { background: var(--gold); color: #0a0c14; font-size: 0.9rem; }
    .buzz-empty { padding: 12px 16px; color: var(--muted); font-size: 0.9rem; }

    /* ── Answering highlight (this player is selected) ──────────── */
    #answerBanner {
      display: none;
      width: 100%;
      max-width: 480px;
      border: 2px solid var(--gold);
      border-radius: var(--radius);
      background: rgba(245,197,24,0.08);
      padding: 20px;
      text-align: center;
      animation: pulseBorder 1.2s ease-in-out infinite;
    }
    #answerBanner.visible { display: block; }
    @keyframes pulseBorder {
      0%, 100% { border-color: var(--gold); box-shadow: 0 0 10px rgba(245,197,24,0.3); }
      50%       { border-color: #fff8c0;    box-shadow: 0 0 30px rgba(245,197,24,0.6); }
    }
    /* Timer bar — shrinks from both sides via scaleX on a centered element */
    .timer-bar-track {
      width: 100%;
      height: 10px;
      background: rgba(255,255,255,0.08);
      border-radius: 5px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .timer-bar-fill {
      height: 100%;
      width: 100%;
      border-radius: 5px;
      transform-origin: center;
      transform: scaleX(1);
      transition: transform 0.25s linear, background-color 0.6s ease;
      background: var(--blue-lt);
    }

    .answer-label {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--gold);
      margin-bottom: 8px;
    }
    #countdown {
      font-size: 5rem;
      font-weight: 900;
      color: var(--text);
      line-height: 1;
    }
    #countdown.urgent { color: var(--danger); animation: shake 0.3s ease-in-out infinite; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25%       { transform: translateX(-3px); }
      75%       { transform: translateX(3px); }
    }
    .timesup { font-size: 1.4rem; font-weight: 700; color: var(--danger); }

    /* ── Wordle mode ────────────────────────────────────────────── */
    /* --card-width / --tile-size / --tile-font are set from JS based on the active
       word's length (applyTileLayout) — long words grow the card first (up to the
       viewport width), and only shrink tiles once that's exhausted, so short words
       look exactly as before and long ones never overflow their box. */
    .wordle-card {
      width: 100%;
      max-width: var(--card-width, 480px);
      margin: 0 auto;
      background: var(--surface);
      border: 2px solid #3a4060;
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
    }
    .wordle-row { display: flex; gap: 5px; justify-content: center; margin-bottom: 5px; overflow-x: auto; }
    .wordle-tile {
      width: var(--tile-size, 42px);
      height: var(--tile-size, 42px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: var(--tile-font, 1.2rem);
      color: #fff;
      border: 2px solid #2a3050;
      border-radius: 4px;
      background: transparent;
      flex-shrink: 0;
    }
    .wordle-tile.correct { background: var(--gold); color: #0a0c14; border-color: var(--gold); }
    .wordle-tile.present { background: var(--blue-lt); color: #fff; border-color: var(--blue-lt); }
    .wordle-tile.absent  { background: #2a3050; color: var(--muted); border-color: #2a3050; }

    .wordle-keyboard { width: 100%; max-width: 480px; margin: 0 auto; }
    .kb-row { display: flex; gap: 6px; justify-content: center; margin-bottom: 6px; }
    .kb-key {
      min-width: 30px;
      height: 46px;
      padding: 0 8px;
      background: #2a3050;
      color: var(--text);
      border-radius: 6px;
      font-weight: 700;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      flex: 1;
    }
    .kb-key.wide { flex: 1.6; font-size: 0.7rem; }
    .kb-key.correct { background: var(--gold); color: #0a0c14; }
    .kb-key.present { background: var(--blue-lt); color: #fff; }
    .kb-key.absent  { background: #14172a; color: var(--muted); }

    .wordle-player-card {
      background: var(--surface);
      border: 2px solid #3a4060;
      border-radius: var(--radius);
      padding: 14px;
      width: 100%;
      max-width: var(--card-width, 480px);
      margin: 0 auto;
    }
    .wordle-player-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 8px; }

    /* ── Sus (Imposter) mode ────────────────────────────────────── */
    .imposter-phase-label {
      font-size: 0.8rem; color: var(--muted); text-transform: uppercase;
      letter-spacing: 1px; text-align: center; margin-bottom: 4px;
    }
    .imposter-round-label { font-size: 0.75rem; color: var(--muted); text-align: center; margin-bottom: 14px; }

    .prompt-form label {
      display: block; font-size: 0.75rem; color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 6px; margin-top: 14px; text-align: left;
    }
    .prompt-form label:first-of-type { margin-top: 0; }
    .prompt-form textarea {
      width: 100%; background: #0a0c14; border: 1px solid #3e3b70; border-radius: 6px;
      color: var(--text); font-size: 0.95rem; padding: 10px 12px; outline: none;
      font-family: inherit; resize: vertical; min-height: 60px;
    }
    .prompt-form textarea:focus { border-color: var(--blue-lt); }
    .btn-submit-prompts { background: var(--gold); color: #0a0c14; width: 100%; padding: 12px; font-size: 1rem; margin-top: 16px; }
    .btn-submit-prompts:hover:not(:disabled) { filter: brightness(1.1); }

    .my-prompt-display { font-size: 1.3rem; font-weight: 700; line-height: 1.4; padding: 10px 0; }
    .discuss-countdown { font-size: 2rem; font-weight: 900; color: var(--gold); margin-top: 12px; }

    .vote-card-list { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 480px; align-items: center; }
    .vote-card {
      background: var(--surface); border: 2px solid #3a4060; border-radius: var(--radius);
      padding: 16px; font-size: 1.05rem; font-weight: 700; text-align: center;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
      width: 100%; -webkit-tap-highlight-color: transparent;
    }
    .vote-card:hover { border-color: var(--blue-lt); }
    .vote-card.voted-for { border-color: var(--gold); background: rgba(245,197,24,0.1); }
    .vote-status { text-align: center; color: var(--muted); font-size: 0.9rem; }

    .results-caption { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; text-align: center; }
    .results-imposter-name { font-size: 1.6rem; font-weight: 900; color: var(--orange); text-align: center; margin: 6px 0 4px; }
    .results-my-outcome { text-align: center; font-size: 1.05rem; font-weight: 700; padding: 10px; border-radius: 8px; margin-top: 12px; }
    .results-my-outcome.correct { background: rgba(245,197,24,0.12); color: var(--gold); }
    .results-my-outcome.wrong   { background: rgba(37,99,201,0.15); color: var(--blue-lt); }
    .results-prompts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
    .results-prompt-card { background: #0a0c14; border: 1px solid #3e3b70; border-radius: 8px; padding: 10px; }
    .results-prompt-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
    .results-prompt-text { font-size: 0.85rem; }
  </style>
</head>
<body>

  <header>
    <div class="game-title" id="gameTitle">Loading…</div>
    <div class="header-sub">
      <div class="room-code">Room&nbsp;<span id="headerCode"></span></div>
      <div class="player-badge" id="playerBadge"></div>
    </div>
  </header>

  <!-- Buzzer panel -->
  <div id="buzzerPanel">
    <!-- Answering banner (shown only when this player is selected) -->
    <div id="answerBanner">
      <div class="timer-bar-track">
        <div class="timer-bar-fill" id="timerBar"></div>
      </div>
      <div class="answer-label">Your turn to answer!</div>
      <div id="countdown">60</div>
    </div>

    <!-- Scoreboard -->
    <div class="scoreboard">
      <div class="scoreboard-title">Scoreboard</div>
      <div id="scoreList"><div class="empty-msg">Waiting for players…</div></div>
    </div>

    <!-- Buzz button -->
    <div class="buzz-section">
      <button id="buzzBtn" onclick="buzz()">BUZZ</button>
      <div class="buzz-hint">or press <strong>Space</strong></div>
    </div>

    <!-- Buzz order -->
    <div class="buzz-order">
      <div class="buzz-order-title">Buzz Order</div>
      <div id="buzzOrderList"><div class="buzz-empty">No buzzes yet</div></div>
    </div>
  </div>

  <!-- Wordle panel -->
  <div id="wordlePanel" style="display:none">
    <div class="wordle-card" id="wordleWaiting">Waiting for the host to push a word…</div>

    <div id="wordleActive" style="display:none">
      <div class="wordle-card">
        <div id="myWordleGrid"></div>
      </div>
      <div class="wordle-keyboard" id="wordleKeyboard"></div>
    </div>

    <div id="solvedSection" style="display:none">
      <div class="buzz-order-title" style="border-radius:10px 10px 0 0;">Solved</div>
      <div id="solvedList"></div>
    </div>
  </div>

  <!-- Sus (Imposter) panel -->
  <div id="imposterPanel" style="display:none">

    <!-- Scoreboard -->
    <div class="scoreboard">
      <div class="scoreboard-title">Scoreboard</div>
      <div id="imposterScoreList"><div class="empty-msg">Waiting for players…</div></div>
    </div>

    <div class="wordle-card">
      <div class="imposter-phase-label" id="imposterPhaseLabel">Waiting</div>
      <div class="imposter-round-label" id="imposterRoundLabel">Round 1</div>

      <!-- Waiting for host to start -->
      <div id="imposterWaitingView">Waiting for the host to start the round…</div>

      <!-- Prompt-setting: this player is the setter -->
      <div id="imposterPromptFormView" style="display:none" class="prompt-form">
        <label>Main Prompt (everyone else sees this)</label>
        <textarea id="mainPromptInput" maxlength="300" placeholder="e.g. Describe your dream vacation"></textarea>
        <label>Imposter Prompt (one random player sees this instead)</label>
        <textarea id="imposterPromptInput" maxlength="300" placeholder="e.g. Describe your worst vacation"></textarea>
        <button class="btn-submit-prompts" onclick="submitImposterPrompts()">Submit Prompts</button>
      </div>

      <!-- Prompt-setting: waiting for someone else -->
      <div id="imposterWaitingForPromptsView" style="display:none"></div>

      <!-- Discussing -->
      <div id="imposterDiscussView" style="display:none">
        <div class="my-prompt-display" id="myPromptText"></div>
        <div class="discuss-countdown" id="discussCountdownPlayer"></div>
      </div>
    </div>

    <!-- Voting -->
    <div id="imposterVoteView" style="display:none" class="vote-card-list">
      <div class="discuss-countdown" id="votingCountdownPlayer" style="text-align:center;"></div>
      <div id="voteCardsList" style="width:100%; display:flex; flex-direction:column; gap:10px;"></div>
      <div class="vote-status" id="voteStatusText"></div>
    </div>

    <!-- Results -->
    <div id="imposterResultsPlayerView" style="display:none">
      <div class="wordle-card">
        <div class="results-caption">The Imposter Was</div>
        <div class="results-imposter-name" id="resultsImposterNamePlayer"></div>
        <div class="results-my-outcome" id="myOutcomeText"></div>
        <div class="results-prompts">
          <div class="results-prompt-card">
            <div class="results-prompt-label">Main Prompt</div>
            <div class="results-prompt-text" id="resultsMainPromptPlayer"></div>
          </div>
          <div class="results-prompt-card">
            <div class="results-prompt-label">Imposter Prompt</div>
            <div class="results-prompt-text" id="resultsImposterPromptPlayer"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Socket.io client (served automatically by socket.io) -->
  <script src="/socket.io/socket.io.js"></script>
  <script>
    // ── Read credentials stored by index.html ─────────────────────────────
    const roomCode   = location.pathname.split('/').pop().toUpperCase();
    const password   = sessionStorage.getItem('roomPass')   || '';
    const playerName = sessionStorage.getItem('playerName') || '';
    const nameColor  = sessionStorage.getItem('nameColor')  || '#E8EAF0';

    document.getElementById('headerCode').textContent  = roomCode;
    document.getElementById('playerBadge').textContent = playerName || 'Player';

    // ── Connect to socket server ──────────────────────────────────────────
    const socket = io();

    socket.on('connect', () => {
      // Introduce ourselves to the server — name color was chosen once, in the join form
      socket.emit('join_room', { roomCode, playerName, password, color: nameColor });
    });

    socket.on('error', ({ message }) => {
      // Redirect home with the message — simplest UX for a wrong password / gone room
      alert('Could not join: ' + message);
      window.location.href = '/?error=room_not_found';
    });

    // ── Countdown timer ───────────────────────────────────────────────────
    // Countdowns compare a server-computed endsAt timestamp against this client's
    // own clock, which can drift from the server's (seen live as the timer
    // starting several seconds short). clockOffsetMs corrects for that — it's
    // refreshed from serverNow on every state update and added to Date.now()
    // wherever "now" is needed for a countdown.
    let clockOffsetMs = 0;
    let timerInterval = null;

    function startCountdown(endsAt) {
      clearInterval(timerInterval);
      const banner = document.getElementById('answerBanner');
      const display = document.getElementById('countdown');

      banner.classList.add('visible');
      display.classList.remove('urgent');
      display.className = ''; // clear timesup class

      const bar = document.getElementById('timerBar');
      let timesUpPlayed = false;
      timerInterval = setInterval(() => {
        const remaining = Math.ceil((endsAt - (Date.now() + clockOffsetMs)) / 1000);

        // Update bar — scaleX(1) = full, scaleX(0) = closed from both sides
        const ratio = Math.max(0, remaining / 60);
        bar.style.transform = `scaleX(${ratio})`;
        bar.style.backgroundColor = remaining <= 10 ? '#e67e22'   /* orange  */
                                   : remaining <= 30 ? '#f5c518'   /* gold    */
                                   :                   '#2563c9';  /* blue    */

        if (remaining <= 0) {
          clearInterval(timerInterval);
          display.innerHTML = '<span class="timesup">Time\'s up!</span>';
          if (!timesUpPlayed) { timesUpPlayed = true; playTimesUpSound(); }
          return;
        }
        display.textContent = remaining;
        if (remaining <= 10) display.classList.add('urgent');
      }, 250);
    }

    function stopCountdown() {
      clearInterval(timerInterval);
      document.getElementById('answerBanner').classList.remove('visible');
    }

    // ── Audio — preload both sounds via Web Audio API ────────────────────────
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let buzzBuffer   = null;
    let timesUpBuffer = null;

    function loadSound(url) {
      return fetch(url).then(r => r.arrayBuffer()).then(buf => audioCtx.decodeAudioData(buf)).catch(() => null);
    }
    loadSound('/rightanswer.mp3').then(b => { buzzBuffer    = b; });
    loadSound('/times-up.mp3').then(b =>   { timesUpBuffer = b; });

    function playSound(buffer, volume = 1.5) {
      if (!buffer) return;
      audioCtx.resume().then(() => {
        const src  = audioCtx.createBufferSource();
        const gain = audioCtx.createGain();
        src.buffer      = buffer;
        gain.gain.value = volume;
        src.connect(gain);
        gain.connect(audioCtx.destination);
        src.start(0);
      });
    }

    function playBuzzSound()   { playSound(buzzBuffer); }
    function playTimesUpSound() { playSound(timesUpBuffer); }

    // ── Buzz button ───────────────────────────────────────────────────────
    let hasBuzzed = false;

    function buzz() {
      if (hasBuzzed) return;
      hasBuzzed = true;
      playBuzzSound();
      socket.emit('buzz', { roomCode });
    }

    // Also trigger buzz on spacebar
    document.addEventListener('keydown', e => {
      if (e.code === 'Space' && e.target === document.body) {
        e.preventDefault();
        buzz();
      }
    });

    // ── Room state update ─────────────────────────────────────────────────
    socket.on('room_state', ({ players, buzzOrder, answeringPlayer, timerEndsAt, hostName, mode, serverNow }) => {
      if (serverNow) clockOffsetMs = serverNow - Date.now();

      // Show host name possessively in all three modes — apostrophe-only for names
      // already ending in s (e.g. "Chris' Sussy Bakas" not "Chris's Sussy Bakas").
      if (hostName) {
        const possessive = hostName + (hostName.endsWith('s') ? '’' : '’s');
        if (mode === 'imposter') {
          document.getElementById('gameTitle').textContent = `Welcome ${possessive} Sussy Bakas`;
        } else {
          const brand = mode === 'wordle' ? 'Hoodlumzle' : 'Jeopardy';
          document.getElementById('gameTitle').textContent = `${possessive} ${brand}`;
        }
      }

      // Toggle which panel is visible based on the room's game mode (fixed at creation)
      document.getElementById('buzzerPanel').style.display   = mode === 'buzzer'   ? '' : 'none';
      document.getElementById('wordlePanel').style.display   = mode === 'wordle'   ? '' : 'none';
      document.getElementById('imposterPanel').style.display = mode === 'imposter' ? '' : 'none';

      renderScoreboard(players, answeringPlayer);
      renderBuzzOrder(buzzOrder, players);

      const btn = document.getElementById('buzzBtn');

      // Show/hide the answering banner
      if (answeringPlayer === socket.id && timerEndsAt) {
        startCountdown(timerEndsAt);
      } else {
        stopCountdown();
      }

      const iInBuzzOrder = buzzOrder.includes(socket.id);
      const iFirst       = buzzOrder[0] === socket.id;
      const iAnswering   = answeringPlayer === socket.id;

      btn.classList.remove('first-buzz', 'buzzed', 'selected');

      if (iAnswering) {
        // Host has selected you — takes priority over the plain buzzed look
        btn.classList.add('selected');
        btn.textContent = 'BUZZED';
        btn.disabled    = true;
        btn.onclick     = null;
      } else if (iInBuzzOrder) {
        btn.classList.add('buzzed');
        if (iFirst) btn.classList.add('first-buzz'); // bonus pulse for the leader
        btn.textContent = iFirst ? 'BUZZED!!' : 'BUZZED';
        btn.disabled    = true;
        btn.onclick     = null;
      } else {
        // Haven't buzzed yet — still allowed even while someone else is answering,
        // so you're ready and queued the moment the host resets or unselects.
        btn.textContent = 'BUZZ';
        btn.disabled    = false;
        btn.onclick     = buzz;
        hasBuzzed       = false;
      }
    });

    // ── Wordle mode ────────────────────────────────────────────────────────
    let lastWordleState = null;
    let currentGuess    = '';
    let myWordLength    = null;

    const KB_ROWS = ['QWERTYUIOP', 'ASDFGHJKL', 'ZXCVBNM'];
    (function buildKeyboard() {
      const el = document.getElementById('wordleKeyboard');
      el.innerHTML = KB_ROWS.map((row, i) => {
        let keys = row.split('').map(ch =>
          `<div class="kb-key" data-key="${ch}" onclick="typeLetter('${ch}')">${ch}</div>`
        ).join('');
        if (i === 2) {
          keys = `<div class="kb-key wide" onclick="submitGuess()">ENTER</div>` + keys +
                 `<div class="kb-key wide" onclick="backspace()">&#9003;</div>`;
        }
        return `<div class="kb-row">${keys}</div>`;
      }).join('');
    })();

    // Sizes the tile grid to the active word's length: grows the card first (up to
    // the viewport width) so a long word never overflows, only shrinking tile size
    // once the viewport itself is the limit. No-op (falls back to the CSS defaults)
    // when there's no active word.
    function applyTileLayout(len) {
      const panel = document.getElementById('wordlePanel');
      if (!len) {
        panel.style.removeProperty('--card-width');
        panel.style.removeProperty('--tile-size');
        panel.style.removeProperty('--tile-font');
        return;
      }
      const gap = 5, padding = 44, naturalTileSize = 42, defaultCardWidth = 480; // 20px padding + 2px border, each side
      const naturalCardWidth = len * naturalTileSize + (len - 1) * gap + padding;
      const viewportMax = window.innerWidth - 32; // leave the page's existing side margins
      // Floor at the original default so short words look exactly as before; only
      // grow past it (up to the viewport) for words that actually need more room.
      const cardWidth = Math.max(defaultCardWidth, Math.min(naturalCardWidth, viewportMax));
      panel.style.setProperty('--card-width', cardWidth + 'px');

      const availableForTiles = cardWidth - padding - gap * (len - 1);
      const tileSize = Math.max(20, Math.min(naturalTileSize, Math.floor(availableForTiles / len)));
      panel.style.setProperty('--tile-size', tileSize + 'px');
      panel.style.setProperty('--tile-font', Math.max(11, Math.round(tileSize * 0.45)) + 'px');
    }

    socket.on('wordle_state', (state) => {
      lastWordleState = state;
      myWordLength     = state.wordLength;
      applyTileLayout(myWordLength);

      document.getElementById('wordleWaiting').style.display = state.pushed ? 'none' : '';
      document.getElementById('wordleActive').style.display  = state.pushed ? '' : 'none';
      if (!state.pushed) currentGuess = '';

      renderMyGrid();
      renderKeyboard(state.myGuesses);
      renderSolvedSection(state.solvedBoards);
    });

    function renderMyGrid() {
      if (!lastWordleState) return;
      const { myGuesses, mySolved } = lastWordleState;
      const el = document.getElementById('myWordleGrid');

      const rows = myGuesses.map(g =>
        `<div class="wordle-row">` + g.guess.split('').map((ch, i) =>
          `<div class="wordle-tile ${g.result[i]}">${esc(ch)}</div>`
        ).join('') + `</div>`
      );

      if (!mySolved) {
        const padded = currentGuess.padEnd(myWordLength || 0, ' ').split('');
        rows.push(`<div class="wordle-row">` + padded.map(ch =>
          `<div class="wordle-tile">${ch.trim() ? esc(ch) : ''}</div>`
        ).join('') + `</div>`);
      }

      el.innerHTML = rows.join('');
    }

    function renderKeyboard(guesses) {
      const rank = { absent: 0, present: 1, correct: 2 };
      const best = {};
      guesses.forEach(g => g.guess.split('').forEach((ch, i) => {
        const st = g.result[i];
        if (!best[ch] || rank[st] > rank[best[ch]]) best[ch] = st;
      }));
      document.querySelectorAll('.kb-key[data-key]').forEach(keyEl => {
        const k = keyEl.dataset.key;
        keyEl.className = 'kb-key' + (best[k] ? ' ' + best[k] : '');
      });
    }

    function renderSolvedSection(solvedBoards) {
      const entries = Object.entries(solvedBoards || {});
      document.getElementById('solvedSection').style.display = entries.length ? '' : 'none';
      document.getElementById('solvedList').innerHTML = entries.map(([id, board]) => `
        <div class="wordle-player-card">
          <div class="wordle-player-name"><span style="color:${safeColor(board.color)}">${esc(board.name)}</span>${id === socket.id ? ' <em style="color:var(--muted);font-size:0.8rem">(you)</em>' : ''}</div>
          ${board.guesses.map(g => `<div class="wordle-row">` +
            g.guess.split('').map((ch, i) => `<div class="wordle-tile ${g.result[i]}">${esc(ch)}</div>`).join('') +
          `</div>`).join('')}
        </div>`).join('');
    }

    function typeLetter(ch) {
      if (lastWordleState?.mySolved) return;
      if (currentGuess.length >= (myWordLength || 0)) return;
      currentGuess += ch;
      renderMyGrid();
    }
    function backspace() {
      if (lastWordleState?.mySolved) return;
      currentGuess = currentGuess.slice(0, -1);
      renderMyGrid();
    }
    function submitGuess() {
      if (lastWordleState?.mySolved) return;
      if (currentGuess.length !== myWordLength) return;
      socket.emit('wordle_guess', { roomCode, guess: currentGuess });
      currentGuess = '';
    }

    // Physical keyboard support (mirrors the spacebar-buzz pattern above).
    // preventDefault matters here: an unhandled Backspace with no input focused
    // can trigger the browser's "navigate back" action in some browsers, which
    // would yank the player off the page entirely.
    document.addEventListener('keydown', e => {
      if (document.getElementById('wordlePanel').style.display === 'none') return;
      if (/^[a-zA-Z]$/.test(e.key)) {
        e.preventDefault();
        typeLetter(e.key.toUpperCase());
      } else if (e.key === 'Backspace') {
        e.preventDefault();
        backspace();
      } else if (e.key === 'Enter') {
        e.preventDefault();
        submitGuess();
      }
    });

    // ── Sus (Imposter) mode ──────────────────────────────────────────────
    let lastImposterState     = null;
    let myVoteFor              = null; // client-tracked, cosmetic "vote cast" confirmation
    let imposterTimerInterval = null;

    function startImposterCountdown(endsAt, elId) {
      clearInterval(imposterTimerInterval);
      const el = document.getElementById(elId);
      imposterTimerInterval = setInterval(() => {
        const remaining = Math.ceil((endsAt - (Date.now() + clockOffsetMs)) / 1000);
        if (remaining <= 0) {
          clearInterval(imposterTimerInterval);
          el.textContent = "Time's up!";
          return;
        }
        el.textContent = remaining + 's';
      }, 250);
    }
    function stopImposterCountdown() { clearInterval(imposterTimerInterval); }

    function submitImposterPrompts() {
      const mainPrompt     = document.getElementById('mainPromptInput').value.trim();
      const imposterPrompt = document.getElementById('imposterPromptInput').value.trim();
      if (!mainPrompt || !imposterPrompt) return;
      socket.emit('submit_prompts', { roomCode, mainPrompt, imposterPrompt });
    }

    function castVote(votedForSocketId) {
      myVoteFor = votedForSocketId;
      socket.emit('cast_vote', { roomCode, votedForSocketId });
      if (lastImposterState) renderVoteCards(lastImposterState); // immediate feedback, don't wait for the round trip
    }

    function renderVoteCards(r) {
      const el = document.getElementById('voteCardsList');
      const candidates = r.eligiblePlayerIds.filter(id => id !== socket.id);
      if (candidates.length === 0) {
        el.innerHTML = '<div class="empty-msg">No other players to vote for</div>';
      } else {
        el.innerHTML = candidates.map(id => {
          const p = r.players[id];
          return `<div class="vote-card ${myVoteFor === id ? 'voted-for' : ''}" onclick="castVote('${esc(id)}')">${esc(p?.name || 'Unknown')}</div>`;
        }).join('');
      }
      document.getElementById('voteStatusText').textContent =
        myVoteFor ? 'Vote cast — waiting for others…' : 'Tap a player to vote';
    }

    const IMPOSTER_PHASE_LABELS = {
      waiting: 'Waiting to Start', prompt_setting: 'Setting Prompts',
      discussing: 'Discussing', voting: 'Voting', results: 'Results',
    };

    socket.on('imposter_room_state', (r) => {
      if (r.serverNow) clockOffsetMs = r.serverNow - Date.now();
      lastImposterState = r;
      if (r.phase !== 'voting') myVoteFor = null;

      document.getElementById('imposterPhaseLabel').textContent = IMPOSTER_PHASE_LABELS[r.phase] || r.phase;
      document.getElementById('imposterRoundLabel').textContent = 'Round ' + r.roundNumber;

      // A player who joined mid-round isn't part of it until the next one starts —
      // they get a distinct waiting message instead of whatever phase view is active.
      const iAmEligible  = r.eligiblePlayerIds.includes(socket.id);
      const midRoundWait = !iAmEligible && r.phase !== 'waiting' && r.phase !== 'results';

      document.getElementById('imposterWaitingView').style.display           = (r.phase === 'waiting' || midRoundWait) ? '' : 'none';
      document.getElementById('imposterPromptFormView').style.display        = (!midRoundWait && r.phase === 'prompt_setting' && r.promptSetter === socket.id) ? '' : 'none';
      document.getElementById('imposterWaitingForPromptsView').style.display = (!midRoundWait && r.phase === 'prompt_setting' && r.promptSetter !== socket.id) ? '' : 'none';
      document.getElementById('imposterDiscussView').style.display           = (!midRoundWait && r.phase === 'discussing') ? '' : 'none';
      document.getElementById('imposterVoteView').style.display              = (!midRoundWait && r.phase === 'voting') ? '' : 'none';
      document.getElementById('imposterResultsPlayerView').style.display     = (r.phase === 'results') ? '' : 'none';

      document.getElementById('imposterWaitingView').textContent = midRoundWait
        ? 'You’ll join in the next round…'
        : 'Waiting for the host to start the round…';

      if (!midRoundWait && r.phase === 'prompt_setting' && r.promptSetter !== socket.id) {
        document.getElementById('imposterWaitingForPromptsView').textContent =
          `Waiting for ${r.promptSetterName} to write this round's prompts…`;
      }

      if (!midRoundWait && r.phase === 'discussing' && r.discussionEndsAt) {
        startImposterCountdown(r.discussionEndsAt, 'discussCountdownPlayer');
      } else if (!midRoundWait && r.phase === 'voting') {
        if (r.votingEndsAt) startImposterCountdown(r.votingEndsAt, 'votingCountdownPlayer');
        renderVoteCards(r);
      } else {
        stopImposterCountdown();
      }

      renderImposterScoreboard(r.players);
    });

    socket.on('imposter_your_prompt', ({ prompt }) => {
      document.getElementById('myPromptText').textContent = prompt;
    });

    socket.on('imposter_results', (results) => {
      document.getElementById('resultsImposterNamePlayer').textContent = results.imposterName;
      document.getElementById('resultsMainPromptPlayer').textContent     = results.mainPrompt;
      document.getElementById('resultsImposterPromptPlayer').textContent = results.imposterPrompt;

      const myVote    = results.voteBreakdown.find(v => v.voterId === socket.id);
      const outcomeEl = document.getElementById('myOutcomeText');
      if (!myVote) {
        outcomeEl.textContent = '';
        outcomeEl.className   = 'results-my-outcome';
      } else if (myVote.votedFor === results.imposter) {
        outcomeEl.textContent = 'You guessed correctly!';
        outcomeEl.className   = 'results-my-outcome correct';
      } else {
        outcomeEl.textContent = 'You did not guess correctly.';
        outcomeEl.className   = 'results-my-outcome wrong';
      }
    });

    function renderImposterScoreboard(players) {
      const el = document.getElementById('imposterScoreList');
      const entries = Object.entries(players || {});
      if (entries.length === 0) {
        el.innerHTML = '<div class="empty-msg">No players yet</div>';
        return;
      }
      entries.sort((a, b) => b[1].score - a[1].score);
      el.innerHTML = entries.map(([id, p]) => {
        const isMe = id === socket.id;
        const tag  = isMe ? ' <em style="font-size:0.75rem;color:var(--muted)">(you)</em>' : '';
        return `<div class="score-row${isMe ? ' me' : ''}">
          <span class="score-name"><span style="color:${safeColor(p.color)}">${esc(p.name)}</span>${tag}</span>
          <span class="score-pts">${p.score} pts</span>
        </div>`;
      }).join('');
    }

    // ── Render helpers ────────────────────────────────────────────────────

    function renderScoreboard(players, answeringPlayer) {
      const el = document.getElementById('scoreList');
      const entries = Object.entries(players);
      if (entries.length === 0) {
        el.innerHTML = '<div class="empty-msg">No players yet</div>';
        return;
      }

      // Sort by score descending
      entries.sort((a, b) => b[1].score - a[1].score);

      el.innerHTML = entries.map(([id, p]) => {
        const isMe        = id === socket.id;
        const isAnswering = id === answeringPlayer;
        let cls = 'score-row';
        if (isMe)        cls += ' me';
        if (isAnswering) cls += ' answering';
        const tag = isMe ? ' <em style="font-size:0.75rem;color:var(--muted)">(you)</em>' : '';
        return `<div class="${cls}">
          <span class="score-name"><span style="color:${safeColor(p.color)}">${esc(p.name)}</span>${tag}</span>
          <span class="score-pts">${p.score} pts</span>
        </div>`;
      }).join('');
    }

    function renderBuzzOrder(buzzOrder, players) {
      const el = document.getElementById('buzzOrderList');
      if (buzzOrder.length === 0) {
        el.innerHTML = '<div class="buzz-empty">No buzzes yet</div>';
        return;
      }
      const ordinals = ['1st', '2nd', '3rd', '4th', '5th', '6th', '7th', '8th'];
      el.innerHTML = '<ul class="buzz-list">' +
        buzzOrder.map((id, i) => {
          const name    = players[id]?.name || 'Unknown';
          const color   = players[id]?.color;
          const liCls   = i === 0 ? 'buzz-first' : '';
          const rankCls = i === 0 ? 'buzz-rank first' : 'buzz-rank';
          const youTag  = id === socket.id ? ' <em style="color:var(--muted);font-size:0.8rem">(you)</em>' : '';
          return `<li class="${liCls}">
            <span class="${rankCls}">${i + 1}</span>
            <strong>${ordinals[i] || (i + 1) + 'th'}:</strong> <span style="color:${safeColor(color)}">${esc(name)}</span>${youTag}
          </li>`;
        }).join('') + '</ul>';
    }

    // Simple HTML-escape to avoid XSS from player-supplied names
    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // Defense in depth: only ever interpolate a verified hex code into a style attribute
    function safeColor(c) {
      return /^#[0-9A-Fa-f]{6}$/.test(c || '') ? c : 'inherit';
    }
  </script>
</body>
</html>
